<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Acccloned - Space Colony in Zero Gravity 🚀</title>
  <meta name="description" content="Kenny-style Animal Crossing clone set in space, powered by TypeGPU and ARDY motion generation">
  <meta name="theme-color" content="#0a0a1f">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      background: #0a0a1f;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    #ui-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    .ui-element {
      pointer-events: auto;
    }
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a1f, #1a1a3f);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #4488ff;
      border-top-color: #6666ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      color: #88aaff;
      font-size: 1.2rem;
    }
    #webgpu-warning {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 50, 50, 0.9);
      color: white;
      padding: 40px;
      border-radius: 12px;
      z-index: 2000;
      text-align: center;
      border: 2px solid #ff6666;
    }
    #webgpu-warning.show {
      display: block;
    }
    .warning-title {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .warning-text {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }
    .warning-button {
      padding: 12px 24px;
      background: #6666ff;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .warning-button:hover {
      background: #8866ff;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="ui-layer"></div>

  <div id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Initializing Space Acccloned...</div>
  </div>

  <div id="webgpu-warning">
    <div class="warning-title">⚠️ WebGPU Not Supported</div>
    <div class="warning-text">
      Your browser does not support WebGPU.<br>
      Please use Chrome 113+, Edge 113+, Firefox 121+, or Safari 16.4+ for the best experience.
    </div>
    <button class="warning-button" onclick="window.location.reload()">
      Try Again
    </button>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
